name = "html2typst"
version = "0.2.0"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
# description = ""
# licences = ["Apache-2.0"]
# repository = { type = "github", user = "", repo = "" }
# links = [{ title = "Website", href = "" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
# hex の 1.0.1 は属性パーサが引用符を見ておらず、値の中の "=" や空白で
# 属性が壊れる（href="...?a=1&b=2" が "2" になる）。
# 修正は upstream main にマージ済みだが未リリースなので、直接そこを指す。
# https://github.com/calvinmclean/html_parser/pull/2
html_parser = { git = "https://github.com/calvinmclean/html_parser", ref = "30409fb54377ff171d147d7edfe567c0f9dd93e7" }
simplifile = ">= 2.6.0 and < 3.0.0"
filepath = ">= 1.1.2 and < 2.0.0"
argv = ">= 1.1.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
